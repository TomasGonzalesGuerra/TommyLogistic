name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install WASM tools
        run: dotnet workload install wasm-tools

      - name: Publish Blazor WASM
        run: dotnet publish TommyLogistic.Web/TommyLogistic.Web.csproj -c Release -o published

      - name: Move framework files to wwwroot
        run: |
          # Mover archivos sueltos a wwwroot primero
          find published -maxdepth 1 -type f \( -name "*.js" -o -name "*.wasm" -o -name "*.dat" -o -name "*.dll" \) \
            -exec mv {} published/wwwroot/ \;
          # Mover carpeta _framework si existe en raíz
          if [ -d "published/_framework" ]; then
            mv published/_framework published/wwwroot/_framework
          fi
          # Mover dotnet.js a _framework
          if [ -f "published/wwwroot/dotnet.js" ]; then
            mv published/wwwroot/dotnet.js published/wwwroot/_framework/dotnet.js
          fi
          # Verificar resultado
          echo "=== Contenido de _framework ==="
          ls published/wwwroot/_framework/ | grep "dotnet"

      - name: Fix blazor fingerprint in index.html
        run: |
          FINGERPRINT=$(find published/wwwroot/_framework -name "blazor.webassembly.*.js" ! -name "*.gz" ! -name "*.br" | sed 's/.*blazor\.webassembly\.\(.*\)\.js/\1/')
          echo "Fingerprint encontrado: $FINGERPRINT"
          sed -i "s/blazor\.webassembly#\[\.{fingerprint}\]\.js/blazor.webassembly.$FINGERPRINT.js/g" published/wwwroot/index.html
          echo "index.html resultado:"
          grep "blazor" published/wwwroot/index.html

      - name: Install OIDC Client from Core Package
        run: npm install @actions/core@1.6.0 @actions/http-client

      - name: Get Id Token
        uses: actions/github-script@v6
        id: idtoken
        with:
          script: |
            const coredemo = require('@actions/core')
            return await coredemo.getIDToken()
          result-encoding: string

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_YELLOW_GRASS_0417F1E10 }}
          action: "upload"
          app_location: "published/wwwroot"
          api_location: ""
          output_location: ""
          github_id_token: ${{ steps.idtoken.outputs.result }}

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "close"