name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
       id-token: write
       contents: read
    steps:
      # 1. Descargar el código del repositorio (Versión actualizada sin avisos de Node)
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      # 2. Instalar el entorno de .NET para compilar Blazor
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 3. Instalar dependencias para la autenticación con Azure
      - name: Install OIDC Client from Core Package
        run: npm install @actions/core @actions/http-client

      # 4. Obtener el token de identidad de GitHub (Versión actualizada sin avisos de Node)
      - name: Get Id Token
        uses: actions/github-script@v7
        id: idtoken
        with:
           script: |
               const coredemo = require('@actions/core')
               return await coredemo.getIDToken()
           result-encoding: string

      # 5. Compilar y publicar el proyecto Blazor de manera explícita
      - name: Publish Blazor App
        run: dotnet publish ./TommyLogistic.Web/TommyLogistic.Web.csproj -c Release -o release-output

      # 6. Subir los archivos resultantes directamente a Azure Static Web Apps
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PROUD_GLACIER_0A05F1710 }}
          action: "upload"
          app_location: "release-output/wwwroot"
          api_location: ""
          output_location: ""
          skip_app_build: true
          github_id_token: ${{ steps.idtoken.outputs.result }}

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "close"
